<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">UpSearch Architecture</title>
  <desc id="desc">Clean architecture overview for UpSearch showing data inputs, Quick Search, Opportunity OS, FastAPI, W&amp;B Cloud, and local SQLite storage.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#182028" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5 0 9Z" fill="#4ade80"/>
    </marker>
    <style>
      .title{fill:#e8eaed;font:700 46px Arial,sans-serif}
      .subtitle{fill:#8b949e;font:500 16px Arial,sans-serif}
      .section{fill:#4ade80;font:700 24px Arial,sans-serif}
      .accent{fill:#f59e0b;font:700 14px Arial,sans-serif;letter-spacing:1.8px}
      .label{fill:#e8eaed;font:600 16px Arial,sans-serif}
      .small{fill:#8b949e;font:500 13px Arial,sans-serif}
      .tiny{fill:#8b949e;font:500 12px Arial,sans-serif}
      .mono{font-family:"Courier New",monospace}
      .panel{fill:#111418;stroke:#39424d;stroke-width:1.5}
      .workflow{fill:#0d1115;stroke:#4a5560;stroke-width:1.5}
      .step{fill:#151a20;stroke:#4ade80;stroke-width:1.3}
      .input{fill:#111418;stroke:#f59e0b;stroke-width:1.4}
      .note{fill:#181c22;stroke:#39424d;stroke-width:1.2}
      .flow{fill:none;stroke:#4ade80;stroke-width:2;marker-end:url(#arrow)}
      .line{fill:none;stroke:#4ade80;stroke-width:2}
      .storage{fill:#111418;stroke:#4ade80;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#0a0c0f"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity=".65"/>

  <text x="800" y="60" text-anchor="middle" class="title">UpSearch Architecture</text>
  <text x="800" y="90" text-anchor="middle" class="subtitle">Two workflows, one frontend, explicit human approval</text>

  <!-- Data inputs -->
  <text x="90" y="145" class="accent">DATA INPUTS</text>
  <rect x="90" y="165" width="410" height="112" rx="12" class="input"/>
  <text x="118" y="205" class="label mono">profile.txt</text>
  <text x="118" y="232" class="small">Manual user profile</text>
  <text x="118" y="256" class="tiny">Skills, coursework, interests, and goals</text>

  <rect x="595" y="165" width="410" height="112" rx="12" class="input"/>
  <text x="623" y="205" class="label">Public Reddit + Hacker News</text>
  <text x="623" y="232" class="small">Live public research signals</text>
  <text x="623" y="256" class="tiny">Used for opportunity discovery and contact research</text>

  <rect x="1100" y="165" width="410" height="112" rx="12" class="input"/>
  <text x="1128" y="205" class="label">Public LinkedIn / GitHub URLs</text>
  <text x="1128" y="232" class="small">Suggested target-contact profiles</text>
  <text x="1128" y="256" class="tiny">Manual verification required before outreach</text>

  <rect x="90" y="298" width="1420" height="44" rx="10" class="note"/>
  <text x="800" y="326" text-anchor="middle" class="small">
    Your LinkedIn profile is not fetched automatically. Personal data comes from profile.txt.
  </text>

  <!-- Frontend -->
  <rect x="595" y="378" width="410" height="62" rx="12" class="panel"/>
  <text x="800" y="417" text-anchor="middle" class="section">React Frontend</text>
  <path d="M800 440V468H420V495" class="flow"/>
  <path d="M800 440V468H1180V495" class="flow"/>

  <!-- Quick Search -->
  <rect x="115" y="482" width="610" height="378" rx="16" class="workflow"/>
  <text x="155" y="528" class="section">Quick Search</text>
  <text x="155" y="553" class="small">Fast path: public signal to one reviewed outreach draft</text>

  <rect x="155" y="590" width="530" height="48" rx="8" class="step"/>
  <text x="420" y="620" text-anchor="middle" class="label">Scout Agent</text>
  <rect x="155" y="654" width="530" height="48" rx="8" class="step"/>
  <text x="420" y="684" text-anchor="middle" class="label">Analyst Agent + Supervisor QA</text>
  <rect x="155" y="718" width="530" height="48" rx="8" class="step"/>
  <text x="420" y="748" text-anchor="middle" class="label">User Selects Lead</text>
  <rect x="155" y="782" width="530" height="48" rx="8" class="step"/>
  <text x="420" y="812" text-anchor="middle" class="label">Strategist Agent + Writer Agent</text>
  <path d="M420 638V654M420 702V718M420 766V782" class="flow"/>

  <!-- Opportunity OS -->
  <rect x="875" y="482" width="610" height="378" rx="16" class="workflow"/>
  <text x="915" y="528" class="section">Opportunity OS</text>
  <text x="915" y="553" class="small">Deep path: company research packet with live SSE updates</text>

  <rect x="915" y="590" width="530" height="48" rx="8" class="step"/>
  <text x="1180" y="620" text-anchor="middle" class="label">Profile Agent + Company Agent</text>
  <rect x="915" y="654" width="530" height="48" rx="8" class="step"/>
  <text x="1180" y="684" text-anchor="middle" class="label">Problem Agent + People Agent</text>
  <rect x="915" y="718" width="530" height="48" rx="8" class="step"/>
  <text x="1180" y="748" text-anchor="middle" class="label">Technical Note + Outreach Agent</text>
  <rect x="915" y="782" width="530" height="48" rx="8" class="step"/>
  <text x="1180" y="812" text-anchor="middle" class="label">QA Agent + Human Approval Queue</text>
  <path d="M1180 638V654M1180 702V718M1180 766V782" class="flow"/>

  <!-- Backend and storage -->
  <path d="M420 860V890H690" class="line"/>
  <path d="M1180 860V890H910" class="line"/>
  <rect x="600" y="872" width="400" height="88" rx="12" class="panel"/>
  <text x="800" y="910" text-anchor="middle" class="section">FastAPI Server</text>
  <text x="720" y="940" text-anchor="middle" class="label mono">/api/*</text>
  <text x="880" y="940" text-anchor="middle" class="label mono">/os/*</text>

  <rect x="140" y="890" width="310" height="70" rx="12" class="storage"/>
  <text x="295" y="920" text-anchor="middle" class="label">W&amp;B Cloud</text>
  <text x="295" y="944" text-anchor="middle" class="small">Logged Quick Search runs</text>
  <path d="M600 925H450" class="flow"/>

  <rect x="1150" y="890" width="310" height="70" rx="12" class="storage"/>
  <text x="1305" y="920" text-anchor="middle" class="label">Local SQLite Storage</text>
  <text x="1305" y="944" text-anchor="middle" class="small">Opportunity OS packets</text>
  <path d="M1000 925H1150" class="flow"/>
</svg>
